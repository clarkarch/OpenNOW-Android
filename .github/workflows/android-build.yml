name: android

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: android-debug
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opennow-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: CI summary
        if: always()
        shell: bash
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "❌ cancelled" ;;
              skipped) echo "⏭️ skipped" ;;
              *) echo "❌ $1" ;;
            esac
          }

          {
            echo "## Android CI Summary"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Build | $(status_icon '${{ steps.build.outcome }}') |"
            echo
            echo "Debug APK uploaded as \`opennow-debug\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"
